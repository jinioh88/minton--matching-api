spring:
  application:
    name: minton-match-api

  # 프로파일: local(로컬/H2), prod(운영/MySQL)
  # 기본값 local - 프로파일 미지정 시 로컬 환경 사용
  profiles:
    default: local


  # Multipart 파일 업로드 (이미지 최대 5MB)
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: 8080

# JWT 설정
jwt:
  # HS256 사용 시 최소 32자 이상 필요. 운영 환경에서는 반드시 환경변수로 설정
  secret: ${JWT_SECRET:default-secret-key-for-development-only-change-in-production-32chars}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

# OAuth2 Redirect URI 허용 목록
# Flutter 앱, React 웹 등 클라이언트별 redirect URI를 등록
# Request의 redirectUri가 이 목록에 있는지 검증 후 토큰 교환 진행

# 대기열 하이브리드 시스템 설정
queue:
  offer-timeout-minutes: 15        # 예약 유효 시간 (분)
  emergency-threshold-hours: 2     # 긴급 선착순 전환 기준 (경기 시작 N시간 미만)

app:
  s3:
    bucket-name: ${AWS_S3_BUCKET:minton-match-uploads}
    region: ${AWS_REGION:ap-northeast-2}
  oauth2:
    allowed-redirect-uris:
      - com.mintonmatch.app://oauth/callback
      - http://localhost:3000/oauth/callback
      - http://127.0.0.1:3000/oauth/callback
