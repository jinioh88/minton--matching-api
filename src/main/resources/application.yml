spring:
  application:
    name: minton-match-api

  # Flyway는 운영(prod)에서만 켠다. 로컬은 Hibernate ddl-auto로 스키마 반영.
  flyway:
    enabled: false

  # 프로파일: local(로컬·MySQL), prod(운영/MySQL)
  # 기본값 local - 프로파일 미지정 시 로컬 환경 사용
  profiles:
    default: local


  # Multipart 파일 업로드 (이미지 최대 5MB)
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: 8080

# JWT 설정
jwt:
  # HS256 사용 시 최소 32자 이상 필요. 운영 환경에서는 반드시 환경변수로 설정
  secret: ${JWT_SECRET:default-secret-key-for-development-only-change-in-production-32chars}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

# OAuth2 Redirect URI 허용 목록
# Flutter 앱, React 웹 등 클라이언트별 redirect URI를 등록
# Request의 redirectUri가 이 목록에 있는지 검증 후 토큰 교환 진행

# 매칭 종료 (Sprint 4): 경기 시작 후 N시간 경과한 CLOSED → FINISHED 자동 전환, 수동 종료 API
match:
  auto-finish-after-start-hours: 10
  auto-finish-cron: "0 0 * * * *"
  require-past-start-for-manual-finish: true

# 후기·평점 가중 갱신 (docs/요구사항분석.md)
review:
  rating-prior-count: 10
  rating-prior-mean: 5.0
  reveal-after-finish-hours: 72

# 패널티·단계별 제재 (docs/Sprint4-할일.md Step 6)
sanction:
  strike-thresholds:
    participation-ban: 3
    full-suspension: 5
    permanent-ban: 10
  durations:
    participation-ban-days: 3
    suspension-days: 7
  penalty-weights:
    NO_SHOW: 2
    LATE: 1

# 대기열 하이브리드 시스템 설정
queue:
  offer-timeout-minutes: 15        # 예약 유효 시간 (분)
  emergency-threshold-hours: 2     # 긴급 선착순 전환 기준 (경기 시작 N시간 미만)

# STOMP 다중 인스턴스: true 시 Redis Pub/Sub 으로 /topic·/queue·/user 브로커 메시지 중계 (spring.data.redis 필요)
# CORS·WebSocket 허용 origin (쉼표 구분). 운영은 application-prod / 환경변수 CORS_ALLOWED_ORIGIN_PATTERNS 로 덮어쓴다.
minton:
  web:
    cors-allowed-origin-patterns: http://localhost:3000,http://127.0.0.1:3000
  chat:
    stomp-redis-relay:
      enabled: false
      channel: minton:chat:stomp-relay
  push:
    fcm:
      enabled: ${FCM_ENABLED:false}
      credentials-path: ${FCM_CREDENTIALS_PATH:}

app:
  s3:
    bucket-name: ${AWS_S3_BUCKET:minton-match-uploads}
    region: ${AWS_REGION:ap-northeast-2}
  oauth2:
    allowed-redirect-uris:
      - com.mintonmatch.app://oauth/callback
      - http://localhost:3000/oauth/callback
      - http://127.0.0.1:3000/oauth/callback
