spring:
  application:
    name: minton-match-api

  # 프로파일: local(로컬/H2), prod(운영/MySQL)
  # 기본값 local - 프로파일 미지정 시 로컬 환경 사용
  profiles:
    default: local

  # OAuth2 설정 (카카오, 네이버, 구글, 애플)
  # client-id, client-secret은 각 플랫폼 개발자 콘솔에서 발급
  # 환경변수로 주입 권장: KAKAO_CLIENT_ID, KAKAO_CLIENT_SECRET 등
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID:fc40fa25652adadc3e8a8145cd66f159}
            client-secret: ${KAKAO_CLIENT_SECRET:nZg9riEiLOH7X701aIENrx6v5bzwIAv5}
            authorization-grant-type: authorization_code
            redirect-uri: http://localhost:3000/oauth/callback
            scope: profile_nickname, account_email
            client-name: Kakao
          naver:
            client-id: ${NAVER_CLIENT_ID:N4sqUk8KmHBMu3NCzN3H}
            client-secret: ${NAVER_CLIENT_SECRET:zltIuv1tCE}
            authorization-grant-type: authorization_code
            redirect-uri: http://localhost:3000/oauth/callback
            scope: name, email, profile_image
            client-name: Naver
          google:
            client-id: ${GOOGLE_CLIENT_ID:995763158335-emb87idkr47r1989dnfp8k7un23mtd69.apps.googleusercontent.com}
            client-secret: ${GOOGLE_CLIENT_SECRET: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}
            authorization-grant-type: authorization_code
            redirect-uri: http://localhost:3000/oauth/callback
            scope: openid, email, profile
            client-name: Google
          apple:
            client-id: ${APPLE_CLIENT_ID:123222}
            client-secret: ${APPLE_CLIENT_SECRET:123123}
            authorization-grant-type: authorization_code
            redirect-uri: http://localhost:3000/oauth/callback
            scope: name, email
            client-name: Apple
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub
          apple:
            authorization-uri: https://appleid.apple.com/auth/authorize
            token-uri: https://appleid.apple.com/auth/token
            # Apple은 user-info API 없음. ID Token JWT에서 claims 추출 (OAuth2Service에서 별도 처리)
            user-info-uri: https://appleid.apple.com

  # Multipart 파일 업로드 (이미지 최대 5MB)
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: 8080

# JWT 설정
jwt:
  # HS256 사용 시 최소 32자 이상 필요. 운영 환경에서는 반드시 환경변수로 설정
  secret: ${JWT_SECRET:default-secret-key-for-development-only-change-in-production-32chars}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

# OAuth2 Redirect URI 허용 목록
# Flutter 앱, React 웹 등 클라이언트별 redirect URI를 등록
# Request의 redirectUri가 이 목록에 있는지 검증 후 토큰 교환 진행
app:
  s3:
    bucket-name: ${AWS_S3_BUCKET:minton-match-uploads}
    region: ${AWS_REGION:ap-northeast-2}
  oauth2:
    allowed-redirect-uris:
      - com.mintonmatch.app://oauth/callback
      - http://localhost:3000/oauth/callback
      - http://127.0.0.1:3000/oauth/callback
