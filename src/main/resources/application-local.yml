# 로컬 환경 - H2 데이터베이스
# OAuth2: 로컬에서는 placeholder 사용. 실제 OAuth 테스트 시 환경변수로 덮어쓰기
spring:
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID:}
            client-secret: ${KAKAO_CLIENT_SECRET:}
            authorization-grant-type: authorization_code
            redirect-uri: http://localhost:3000/oauth/callback
            scope: profile_nickname
            client-name: Kakao
          naver:
            client-id: ${NAVER_CLIENT_ID:}
            client-secret: ${NAVER_CLIENT_SECRET:}
            authorization-grant-type: authorization_code
            redirect-uri: http://localhost:3000/oauth/callback
            scope: name, email, profile_image
            client-name: Naver
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            authorization-grant-type: authorization_code
            redirect-uri: http://localhost:3000/oauth/callback
            scope: openid, email, profile
            client-name: Google
          apple:
            client-id: ${APPLE_CLIENT_ID:}
            client-secret: ${APPLE_CLIENT_SECRET:}
            authorization-grant-type: authorization_code
            redirect-uri: http://localhost:3000/oauth/callback
            scope: name, email
            client-name: Apple
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub
          apple:
            authorization-uri: https://appleid.apple.com/auth/authorize
            token-uri: https://appleid.apple.com/auth/token
            # Apple은 user-info API 없음. ID Token JWT에서 claims 추출 (OAuth2Service에서 별도 처리)
            user-info-uri: https://appleid.apple.com

  datasource:
    url: jdbc:h2:mem:minton_match;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false

  h2:
    console:
      enabled: true
