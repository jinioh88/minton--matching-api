# 운영 환경 - AWS RDS (MySQL)
# 환경변수: DB_URL(전체 URL) 또는 DB_HOST, DB_PORT, DB_NAME, DB_USERNAME, DB_PASSWORD
# OAuth2 redirect-uri: OAUTH_REDIRECT_URI (기본값: Flutter 앱 스킴)
spring:
  security:
    oauth2:
      client:
        registration:
          kakao:
            redirect-uri: ${OAUTH_REDIRECT_URI:com.mintonmatch.app://oauth/callback}
          naver:
            redirect-uri: ${OAUTH_REDIRECT_URI:com.mintonmatch.app://oauth/callback}
          google:
            redirect-uri: ${OAUTH_REDIRECT_URI:com.mintonmatch.app://oauth/callback}
          apple:
            redirect-uri: ${OAUTH_REDIRECT_URI:com.mintonmatch.app://oauth/callback}

  datasource:
    url: ${DB_URL:jdbc:mysql://cuddle-db.ctssuui2kqsn.ap-northeast-2.rds.amazonaws.com:3306/minton_match?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false
